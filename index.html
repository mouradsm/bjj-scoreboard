<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#0b0b0c;font-family:'Barlow',system-ui,sans-serif;color:#e9eaec}
  input{font-family:inherit}
  button{font-family:inherit;cursor:pointer}
  a{color:#f0c419;text-decoration:none}a:hover{color:#ffd83a}
  @keyframes stallpulse{0%,100%{opacity:1}50%{opacity:.5}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#33353b;border-radius:5px}

  /* ---------- control view ---------- */
  .ctl{min-height:100vh;display:flex;flex-direction:column;background:#0f1013}
  .topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 20px;background:#0a0b0d;border-bottom:1px solid #23252b}
  .brand{font-family:'Barlow Condensed';font-weight:700;font-size:24px;letter-spacing:1px;color:#f0c419;white-space:nowrap}
  .meta-in{background:#15171b;border:1px solid #2a2d34;border-radius:8px;color:#e9eaec;font-size:13px;font-weight:600;padding:9px 12px}

  .btn{border:none;border-radius:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .btn-ghost{background:#22242a;color:#cdd0d6;border:1px solid #33363d}
  .btn-ghost:hover{background:#2c2f36}
  .btn-green{background:#2f9e44;color:#fff}
  .btn-green:hover{background:#37b850}

  .winbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 20px;background:#17140a;border-bottom:2px solid #f0c419}

  .athlete{display:flex;gap:18px;padding:16px 20px;align-items:center}
  .athlete.a{background:#16181c;border-left:9px solid #c9ccd1}
  .athlete.b{background:#111a2b;border-left:9px solid #2f6fd6}
  .a-side{width:300px;min-width:300px;display:flex;flex-direction:column;gap:9px}
  .dot{width:14px;height:14px;border-radius:50%;flex:none}
  .name-in{background:#0e0f12;border:1px solid #2a2d34;border-radius:8px;color:#fff;font-size:20px;font-weight:700;padding:8px 11px;width:100%;text-transform:uppercase}
  .team-in{background:#0e0f12;border:1px solid #2a2d34;border-radius:8px;color:#aeb2b9;font-size:13px;font-weight:600;padding:6px 11px;width:100%;text-transform:uppercase}
  .stats{display:flex;gap:16px;align-items:flex-end;margin-top:2px}
  .stat-lbl{font-size:10px;color:#7f838b;font-weight:800;letter-spacing:1px}
  .stat-big{font-family:'Barlow Condensed';font-size:56px;font-weight:700;line-height:.85;color:#43c463}
  .stat-mid{font-family:'Barlow Condensed';font-size:40px;font-weight:700;line-height:.85}
  .stat-mid.adv{color:#d9c04a}.stat-mid.pen{color:#e0685c}
  .pad{flex:1;display:grid;grid-template-columns:repeat(5,1fr) 1.25fr;gap:8px}
  .pad .add{height:74px;border:none;border-radius:10px;color:#fff;font-size:26px;font-weight:800}
  .pad .add.pt{background:#2f9e44}.pad .add.pt:hover{background:#37b850}
  .pad .add.av{background:#b59a2b}.pad .add.av:hover{background:#cbad30}
  .pad .add.pn{background:#c9362a}.pad .add.pn:hover{background:#e0473a}
  .pad .stall{grid-column:6;grid-row:1 / span 2;border:2px solid #3a3d44;border-radius:10px;font-size:16px;font-weight:800;letter-spacing:1px}
  .pad .sub{height:56px;border:2px solid #34373e;border-radius:10px;background:#1c1e23;color:#aeb2b9;font-size:19px;font-weight:700}
  .pad .sub:hover{border-color:#54585f;color:#fff}
  .pad .sub.av{color:#d9c04a;border-color:#4a4326}.pad .sub.av:hover{border-color:#b59a2b}
  .pad .sub.pn{color:#e0685c;border-color:#4a2a26}.pad .sub.pn:hover{border-color:#c9362a}

<script>
(() => {
  "use strict";

  // ---- config (mirrors the design's props) ----
  const CONFIG = { enableBuzzer: true, defaultMinutes: 5, showTeam: true };
  const KEY = 'bjj_placar_state_v1';
  const CH  = 'bjj_placar_v1';
  const LKEY = 'bjj_lang';

  // ---- i18n (PT / EN) ----
  const I18N = {
    pt: {
      brand: 'PLACAR BJJ',
      ph_comp: 'Nome da competição', ph_phase: 'Fase (ex.: Qualificatória)', ph_cat: 'Categoria (idade / sexo / faixa / peso)',
      t_preview: 'Pré-visualizar', t_openDisplay: 'Abrir Tela de Exibição ↗',
      t_winner_label: 'VENCEDOR', t_reopen: '↩ Reabrir luta', t_newMatch: 'Nova Luta',
      t_tie_label: 'EMPATE — ESCOLHA O VENCEDOR (decisão do árbitro)',
      ph_team: 'Equipe', t_points: 'PONTOS', t_adv: 'VANT', t_pen: 'PUN',
      t_reset: 'Zerar', t_undo: '↩ Desfazer', t_swap: '⇄ Trocar Lados', t_newMatchF: '✚ Nova Luta',
      t_finish: 'Encerrar Luta', t_previewClose: '✕ Fechar pré-visualização',
      t_start: 'Iniciar', t_pause: 'Pausar',
      d_winner: '🏆 Vencedor', d_tie: 'EMPATE', d_tie_sub: 'Aguardando decisão do árbitro',
      t_donate: '❤ Apoiar',
      seedComp: 'Copa Regional de Jiu-Jitsu', seedPhase: 'QUALIFICATÓRIA', seedCat: 'MASTER 3 / MASCULINO / AZUL / PENA',
      seedA: 'Atleta 1', seedB: 'Atleta 2', seedTeamA: 'Equipe A', seedTeamB: 'Equipe B',
      dn_title: 'Apoiar o projeto', dn_intro: 'Se o Placar BJJ te ajuda, considere uma doação. Obrigado! 🙏',
      dn_pix_copy_key: 'Copiar chave', dn_pix_copy_code: 'Copiar código Pix', dn_copied: 'Copiado!', dn_open_link: 'Abrir'
    },
    en: {
      brand: 'BJJ SCOREBOARD',
      ph_comp: 'Competition name', ph_phase: 'Phase (e.g., Qualifier)', ph_cat: 'Category (age / gender / belt / weight)',
      t_preview: 'Preview', t_openDisplay: 'Open Display Screen ↗',
      t_winner_label: 'WINNER', t_reopen: '↩ Reopen match', t_newMatch: 'New Match',
      t_tie_label: 'TIE — CHOOSE THE WINNER (referee decision)',
      ph_team: 'Team', t_points: 'POINTS', t_adv: 'ADV', t_pen: 'PEN',
      t_reset: 'Reset', t_undo: '↩ Undo', t_swap: '⇄ Swap Sides', t_newMatchF: '✚ New Match',
      t_finish: 'End Match', t_previewClose: '✕ Close preview',
      t_start: 'Start', t_pause: 'Pause',
      d_winner: '🏆 Winner', d_tie: 'TIE', d_tie_sub: 'Awaiting referee decision',
      t_donate: '❤ Support',
      seedComp: 'Regional Jiu-Jitsu Cup', seedPhase: 'QUALIFIER', seedCat: 'MASTER 3 / MALE / BLUE / FEATHER',
      seedA: 'Athlete 1', seedB: 'Athlete 2', seedTeamA: 'Team A', seedTeamB: 'Team B',
      dn_title: 'Support the project', dn_intro: 'If BJJ Scoreboard helps you, consider a donation. Thank you! 🙏',
      dn_pix_copy_key: 'Copy key', dn_pix_copy_code: 'Copy Pix code', dn_copied: 'Copied!', dn_open_link: 'Open'
    }
  };

  // ---- donation config: fill these in to enable the "Support" button ----
  const DONATE = {
    pix:    { key: '', name: '', city: '' },   // ex.: { key: 'sua-chave@email.com', name: 'DIEGO MOURA', city: 'SAO PAULO' }
    kofi:   '',                                 // ex.: 'https://ko-fi.com/seunome'
    paypal: ''                                  // ex.: 'https://paypal.me/seunome'
  };
  function hasDonate() { return !!(DONATE.pix.key || DONATE.kofi || DONATE.paypal); }

  function detectLang() {
    try { const s = localStorage.getItem(LKEY); if (s === 'pt' || s === 'en') return s; } catch (e) {}
    try { return (navigator.language || 'pt').toLowerCase().indexOf('pt') === 0 ? 'pt' : 'en'; } catch (e) {}
    return 'pt';
  }
  let lang = detectLang();
  const tr = (k) => (I18N[lang] && I18N[lang][k] != null) ? I18N[lang][k] : (I18N.pt[k] != null ? I18N.pt[k] : k);

  let viewParam = null;
  try { viewParam = new URLSearchParams(location.search).get('view'); } catch (e) {}
  const isDisplayWin = viewParam === 'display';

  const mins = CONFIG.defaultMinutes;
  const state = {
    lang: lang,
    competition: tr('seedComp'),
    phase: tr('seedPhase'),
    category: tr('seedCat'),
    previewDisplay: false,
    finished: false,
    winnerIdx: null,
    isTie: false,
    fighters: [
      { name: tr('seedA'), team: tr('seedTeamA'), points: 0, adv: 0, pen: 0, stalling: false },
      { name: tr('seedB'), team: tr('seedTeamB'), points: 0, adv: 0, pen: 0, stalling: false }
    ],
    timer: { total: mins * 60, remaining: mins * 60, running: false }
  };

  let hist = [];
  let endTs = null;
  let channel = null;
  let audioCtx = null;
  let displayWin = null;   // handle to the opened display window (control side)

  const $ = (id) => document.getElementById(id);

  // ---- sync helpers ----
  function share() {
    return {
      competition: state.competition, category: state.category, phase: state.phase,
      fighters: state.fighters, timer: state.timer,
      finished: state.finished, winnerIdx: state.winnerIdx, isTie: state.isTie,
      lang: state.lang
    };
  }
  function loadShare() {
    try { const raw = localStorage.getItem(KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
  }
  function persist() {
    const snap = share();
    try { localStorage.setItem(KEY, JSON.stringify(snap)); } catch (e) {}
    try { if (channel) channel.postMessage(snap); } catch (e) {}
    // Direct window->window path: robust even on file:// where BroadcastChannel
    // and cross-window localStorage events are unreliable.
    try { if (displayWin && !displayWin.closed) displayWin.postMessage({ __bjj: 'state', data: snap }, '*'); } catch (e) {}
  }
  function applyState(data) { Object.assign(state, data); }
  function commit(partial) { applyState(partial); persist(); render(); }
  function applyRemote(data) {
    if (!data) return;
    const prev = state.timer ? state.timer.remaining : null;
    const langChanged = data.lang && data.lang !== lang;
    applyState(data);
    if (langChanged) { lang = state.lang; applyI18n(); }
    if (prev > 0 && data.timer && data.timer.remaining <= 0) playBuzzer();
    render();
  }

  // ---- scoring ----
  function pushHistory() {
    hist.push(JSON.parse(JSON.stringify({ fighters: state.fighters })));
    if (hist.length > 60) hist.shift();
  }
  function adjust(i, field, d) {
    pushHistory();
    const f = state.fighters.map(x => ({ ...x }));
    f[i][field] = Math.max(0, f[i][field] + d);
    commit({ fighters: f });
  }
  function toggleStall(i) {
    pushHistory();
    const f = state.fighters.map(x => ({ ...x }));
    f[i].stalling = !f[i].stalling;
    commit({ fighters: f });
  }
  function setField(i, k, v) {
    const f = state.fighters.map(x => ({ ...x }));
    f[i][k] = v;
    commit({ fighters: f });
  }
  function undo() {
    if (!hist.length) return;
    const snap = hist.pop();
    commit({ fighters: snap.fighters });
  }
  function switchSides() {
    pushHistory();
    commit({ fighters: [{ ...state.fighters[1] }, { ...state.fighters[0] }] });
  }
  function computeWinner() {
    const [x, y] = state.fighters;
    if (x.points !== y.points) return x.points > y.points ? 0 : 1;
    if (x.adv !== y.adv) return x.adv > y.adv ? 0 : 1;
    if (x.pen !== y.pen) return x.pen < y.pen ? 0 : 1;
    return 'tie';
  }
  function finishMatch() {
    const w = computeWinner();
    const rem = currentRemaining();
    endTs = null;
    commit({
      finished: true,
      winnerIdx: w === 'tie' ? null : w,
      isTie: w === 'tie',
      timer: { ...state.timer, running: false, remaining: rem }
    });
  }
  function chooseWinner(i) { commit({ winnerIdx: i, isTie: false }); }
  function reopenMatch() { commit({ finished: false, winnerIdx: null, isTie: false }); }
  function newMatch() {
    pushHistory();
    const f = state.fighters.map(x => ({ ...x, points: 0, adv: 0, pen: 0, stalling: false }));
    endTs = null;
    commit({
      fighters: f, finished: false, winnerIdx: null, isTie: false,
      timer: { ...state.timer, remaining: state.timer.total, running: false }
    });
  }

  // ---- timer ----
  function currentRemaining() {
    if (state.timer.running && endTs) return Math.max(0, Math.ceil((endTs - Date.now()) / 1000));
    return state.timer.remaining;
  }
  function toggleTimer() {
    const t = { ...state.timer };
    if (t.running) {
      t.remaining = currentRemaining();
      t.running = false;
      endTs = null;
    } else {
      if (t.remaining <= 0) return;
      t.running = true;
      endTs = Date.now() + t.remaining * 1000;
    }
    commit({ timer: t });
  }
  function resetTimer() {
    endTs = null;
    commit({ timer: { ...state.timer, remaining: state.timer.total, running: false } });
  }
  function bump(sec) {
    const t = { ...state.timer };
    const base = Math.max(0, currentRemaining() + sec);
    t.remaining = base;
    if (t.running) endTs = Date.now() + base * 1000;
    commit({ timer: t });
  }
  function setTotal(sec) {
    endTs = null;
    commit({ timer: { total: sec, remaining: sec, running: false } });
  }
  function tick() {
    if (!state.timer.running) return;
    const rem = Math.max(0, Math.ceil((endTs - Date.now()) / 1000));
    if (rem <= 0) {
      // Time's up: stop the clock and sound the buzzer, but do NOT declare a
      // winner — the referee may still score after the bell. Declaring the
      // winner is an explicit action ("Encerrar Luta"). Checked before the
      // change guard so it also fires if the clock was cranked straight to 0.
      playBuzzer();
      endTs = null;
      commit({ timer: { ...state.timer, remaining: 0, running: false } });
      return;
    }
    if (rem !== state.timer.remaining) {
      commit({ timer: { ...state.timer, remaining: rem } });
    }
  }
  function playBuzzer() {
    if (!CONFIG.enableBuzzer) return;
    try {
      const ctx = audioCtx || (audioCtx = new (window.AudioContext || window.webkitAudioContext)());
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      [0, 0.24, 0.48].forEach((t, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'square';
        o.frequency.value = i < 2 ? 880 : 660;
        o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.0001, now + t);
        g.gain.exponentialRampToValueAtTime(0.35, now + t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.2);
        o.start(now + t); o.stop(now + t + 0.22);
      });
    } catch (e) {}
  }

  // ---- ui actions ----
  function openDisplay() {
    try {
      const url = location.pathname + '?view=display';
      displayWin = window.open(url, 'bjj_display', 'width=1280,height=720');
    } catch (e) {}
  }
  function togglePreview() { state.previewDisplay = !state.previewDisplay; render(); }

  // ---- render ----
  function setText(id, v) { const el = $(id); if (el && el.textContent !== String(v)) el.textContent = v; }
  function setVal(id, v) { const el = $(id); if (el && el !== document.activeElement && el.value !== v) el.value = v; }
  function show(id, on) { const el = $(id); if (el) el.classList.toggle('hidden', !on); }

  function render() {
    const st = state;
    const isDisplay = isDisplayWin || st.previewDisplay;
    const isControl = !isDisplay;

    $('ctl').classList.toggle('hidden', !isControl);
    $('disp').classList.toggle('hidden', !isDisplay);

    const t = st.timer;
    const m = Math.floor(t.remaining / 60), s = t.remaining % 60;
    const timeText = m + ':' + String(s).padStart(2, '0');
    const low = (t.running && t.remaining <= 10) || t.remaining === 0;
    const showTeam = CONFIG.showTeam;
    const wi = st.winnerIdx;
    const resultHasWinner = st.finished && wi !== null && wi !== undefined;
    const resultIsTie = st.finished && (wi === null || wi === undefined);

    if (isControl) {
      setVal('comp', st.competition);
      setVal('phase', st.phase);
      setVal('cat', st.category);
      ['a', 'b'].forEach((side, i) => {
        const f = st.fighters[i];
        setVal(side + 'Name', f.name);
        setVal(side + 'Team', f.team);
        setText(side + 'Points', f.points);
        setText(side + 'Adv', f.adv);
        setText(side + 'Pen', f.pen);
        const stall = $(side + 'Stall');
        stall.style.background = f.stalling ? '#f0a500' : '#1c1e23';
        stall.style.color = f.stalling ? '#111' : '#cfcfcf';
      });
      setText('clockCtl', timeText);
      $('clockCtl').style.color = low ? '#ff5b4d' : '#f2f2f2';
      setText('playBtn', t.running ? tr('t_pause') : tr('t_start'));

      show('winbar', st.finished);
      show('winbarWinner', resultHasWinner);
      show('winbarTie', resultIsTie);
      if (resultHasWinner) setText('winnerName', st.fighters[wi].name);
      if (resultIsTie) {
        setText('chooseA', st.fighters[0].name);
        setText('chooseB', st.fighters[1].name);
      }
    }

    if (isDisplay) {
      ['A', 'B'].forEach((L, i) => {
        const f = st.fighters[i];
        setText('d' + L + 'Name', f.name);
        setText('d' + L + 'Team', f.team);
        show('d' + L + 'Team', showTeam);
        setText('d' + L + 'Points', f.points);
        setText('d' + L + 'Adv', f.adv);
        setText('d' + L + 'Pen', f.pen);
        show('d' + L + 'Stall', f.stalling);
      });
      setText('dClock', timeText);
      $('dClock').style.color = low ? '#ff5b4d' : '#fff';
      setText('dPhase', st.phase);
      setText('dCat', st.category);
      setText('dComp', st.competition);

      show('dOverlay', st.finished);
      show('dOvWinner', resultHasWinner);
      show('dOvTie', resultIsTie);
      if (resultHasWinner) {
        setText('dWinnerName', st.fighters[wi].name);
        setText('dWinnerTeam', st.fighters[wi].team);
        $('dWinnerName').style.color = wi === 1 ? '#4d8bf0' : '#fff';
      }
      show('previewCloseBtn', st.previewDisplay);
    }
  }

  // ---- wiring ----
  function wire() {
    // meta inputs
    $('comp').addEventListener('input', e => commit({ competition: e.target.value }));
    $('phase').addEventListener('input', e => commit({ phase: e.target.value }));
    $('cat').addEventListener('input', e => commit({ category: e.target.value }));

    // athlete name/team inputs
    $('aName').addEventListener('input', e => setField(0, 'name', e.target.value));
    $('aTeam').addEventListener('input', e => setField(0, 'team', e.target.value));
    $('bName').addEventListener('input', e => setField(1, 'name', e.target.value));
    $('bTeam').addEventListener('input', e => setField(1, 'team', e.target.value));

    // score pad buttons
    document.querySelectorAll('.pad .add, .pad .sub').forEach(btn => {
      btn.addEventListener('click', () => adjust(+btn.dataset.i, btn.dataset.f, +btn.dataset.d));
    });
    $('aStall').addEventListener('click', () => toggleStall(0));
    $('bStall').addEventListener('click', () => toggleStall(1));

    // timer
    $('playBtn').addEventListener('click', toggleTimer);
    $('resetBtn').addEventListener('click', resetTimer);
    $('sub30Btn').addEventListener('click', () => bump(-30));
    $('add30Btn').addEventListener('click', () => bump(30));
    document.querySelectorAll('.preset').forEach(btn => {
      btn.addEventListener('click', () => setTotal(+btn.dataset.sec));
    });

    // footer
    $('undoBtn').addEventListener('click', undo);
    $('switchBtn').addEventListener('click', switchSides);
    $('newBtn').addEventListener('click', newMatch);
    $('finishBtn').addEventListener('click', finishMatch);

    // top bar
    $('previewBtn').addEventListener('click', togglePreview);
    $('previewCloseBtn').addEventListener('click', togglePreview);
    $('openDisplayBtn').addEventListener('click', openDisplay);
    $('langToggle').addEventListener('click', () => setLang(lang === 'pt' ? 'en' : 'pt'));
    $('donateBtn').addEventListener('click', openDonate);

    // winner bar
    $('reopenBtn').addEventListener('click', reopenMatch);
    $('newFromWinBtn').addEventListener('click', newMatch);
    $('newFromTieBtn').addEventListener('click', newMatch);
    $('chooseA').addEventListener('click', () => chooseWinner(0));
    $('chooseB').addEventListener('click', () => chooseWinner(1));
  }

  // ---- i18n runtime ----
  function applyI18n() {
    const d = I18N[lang] || I18N.pt;
    document.querySelectorAll('[data-i18n]').forEach((el) => {
      const k = el.getAttribute('data-i18n');
      if (d[k] != null) el.textContent = d[k];
    });
    document.querySelectorAll('[data-i18n-ph]').forEach((el) => {
      const k = el.getAttribute('data-i18n-ph');
      if (d[k] != null) el.setAttribute('placeholder', d[k]);
    });
    try { document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en'; } catch (e) {}
    const lt = $('langToggle'); if (lt) lt.textContent = lang === 'pt' ? 'EN' : 'PT';
  }
  function setLang(l) {
    if (l !== 'pt' && l !== 'en') return;
    lang = l; state.lang = l;
    try { localStorage.setItem(LKEY, l); } catch (e) {}
    applyI18n();
    persist();   // propaga o idioma (via estado compartilhado) para a tela de exibição
    render();
  }

  // ---- donation ----
  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function escA(s) { return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
  // Static Pix BR Code (EMV) without amount. CRC16/CCITT-FALSE (poly 0x1021, init 0xFFFF).
  function pixPayload(key, name, city) {
    const f = (id, v) => id + String(v.length).padStart(2, '0') + v;
    const norm = (s, n) => (s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^\x20-\x7E]/g, '').toUpperCase().slice(0, n);
    const mai = f('26', f('00', 'br.gov.bcb.pix') + f('01', key));
    let p = f('00', '01') + mai + f('52', '0000') + f('53', '986') + f('58', 'BR') +
            f('59', norm(name, 25) || 'NA') + f('60', norm(city, 15) || 'NA') + f('62', f('05', '***')) + '6304';
    let crc = 0xFFFF;
    for (let i = 0; i < p.length; i++) {
      crc ^= p.charCodeAt(i) << 8;
      for (let j = 0; j < 8; j++) crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) & 0xFFFF : (crc << 1) & 0xFFFF;
    }
    return p + crc.toString(16).toUpperCase().padStart(4, '0');
  }
  function copyText(str, btn) {
    const restore = btn.textContent, done = tr('dn_copied');
    const ok = () => { btn.textContent = done; setTimeout(() => { btn.textContent = restore; }, 1500); };
    const fallback = () => {
      try {
        const ta = document.createElement('textarea');
        ta.value = str; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); ok();
      } catch (e) {}
    };
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(str).then(ok, fallback); return; }
    } catch (e) {}
    fallback();
  }
  function linkRow(name, url, badge) {
    return '<a href="' + escA(url) + '" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:space-between;gap:10px;text-decoration:none;border:1px solid #2a2d34;border-radius:12px;padding:14px;margin-bottom:12px;background:#0e0f12">'
      + '<span style="font-size:15px;font-weight:800;color:#e9eaec">' + esc(name) + '</span>'
      + '<span style="font-size:13px;font-weight:800;color:#f0c419">' + esc(badge) + ' ↗</span></a>';
  }
  function openDonate() {
    const old = $('bjjDonate'); if (old) old.remove();
    const ov = document.createElement('div');
    ov.id = 'bjjDonate';
    ov.style.cssText = "position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;padding:20px;font-family:'Barlow',system-ui,sans-serif";
    ov.addEventListener('click', (e) => { if (e.target === ov) ov.remove(); });
    const card = document.createElement('div');
    card.style.cssText = 'background:#15171b;border:1px solid #2a2d34;border-radius:16px;max-width:420px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.6);color:#e9eaec;max-height:90vh;overflow:auto';
    let html = '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px">'
      + '<div style="font-size:20px;font-weight:800;color:#f0c419">' + esc(tr('dn_title')) + '</div>'
      + '<button id="bjjDonateX" aria-label="close" style="background:transparent;border:none;color:#9aa0a8;font-size:20px;font-weight:700;cursor:pointer;line-height:1">✕</button></div>'
      + '<div style="font-size:14px;color:#aeb2b9;margin-bottom:16px">' + esc(tr('dn_intro')) + '</div>';
    if (DONATE.pix.key) {
      const code = pixPayload(DONATE.pix.key, DONATE.pix.name, DONATE.pix.city);
      html += '<div style="border:1px solid #2a2d34;border-radius:12px;padding:14px;margin-bottom:12px">'
        + '<div style="font-size:13px;font-weight:800;color:#f0c419;margin-bottom:8px">Pix</div>'
        + '<div style="font-size:13px;word-break:break-all;background:#0e0f12;border:1px solid #23252b;border-radius:8px;padding:8px 10px;margin-bottom:10px">' + esc(DONATE.pix.key) + '</div>'
        + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
        + '<button class="bjjCopy" data-v="' + escA(DONATE.pix.key) + '" style="flex:1;min-width:120px;background:#2f9e44;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:800;cursor:pointer">' + esc(tr('dn_pix_copy_key')) + '</button>'
        + '<button class="bjjCopy" data-v="' + escA(code) + '" style="flex:1;min-width:120px;background:#22242a;color:#e6e8ec;border:1px solid #34373e;border-radius:8px;padding:10px;font-size:13px;font-weight:800;cursor:pointer">' + esc(tr('dn_pix_copy_code')) + '</button>'
        + '</div></div>';
    }
    if (DONATE.kofi) html += linkRow('Ko-fi', DONATE.kofi, tr('dn_open_link'));
    if (DONATE.paypal) html += linkRow('PayPal', DONATE.paypal, tr('dn_open_link'));
    card.innerHTML = html;
    ov.appendChild(card);
    document.body.appendChild(ov);
    card.querySelector('#bjjDonateX').onclick = () => ov.remove();
    card.querySelectorAll('.bjjCopy').forEach((b) => { b.onclick = () => copyText(b.getAttribute('data-v'), b); });
  }

  // ---- boot ----
  function boot() {
    wire();
    if (hasDonate()) $('donateBtn').classList.remove('hidden');
    try { channel = new BroadcastChannel(CH); } catch (e) { channel = null; }
    const saved = loadShare();

    if (isDisplayWin) {
      if (saved) applyState(saved);
      if (channel) channel.onmessage = (e) => applyRemote(e.data);
      window.addEventListener('storage', (e) => {
        if (e.key === KEY && e.newValue) {
          try { applyRemote(JSON.parse(e.newValue)); } catch (err) {}
        }
      });
      // Direct path (works on file://): accept state pushed by the control window,
      // and ask the opener for the current state as soon as we open.
      window.addEventListener('message', (e) => {
        const d = e.data;
        if (d && d.__bjj === 'state') applyRemote(d.data);
      });
      try { if (window.opener && !window.opener.closed) window.opener.postMessage({ __bjj: 'hello' }, '*'); } catch (e) {}
    } else {
      if (saved) applyState({ ...saved, timer: { ...saved.timer, running: false } });
      // A freshly opened display asks for state via 'hello'; reply with a full push.
      window.addEventListener('message', (e) => {
        const d = e.data;
        if (d && d.__bjj === 'hello') {
          if (e.source) { try { displayWin = e.source; } catch (err) {} }
          persist();
        }
      });
      setInterval(tick, 200);
    }
    if (state.lang === 'pt' || state.lang === 'en') lang = state.lang;
    applyI18n();
    render();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>

<script>
(function () {
  if (!("serviceWorker" in navigator)) return;
  var isDisplay = false;
  try { isDisplay = new URLSearchParams(location.search).get("view") === "display"; } catch (e) {}

  window.addEventListener("load", function () {
    var pending = false; // true depois que o usuário pede para atualizar

    // Aviso discreto de nova versão (só na tela de controle — nunca no projetor).
    function showUpdate(worker) {
      if (isDisplay) return;
      if (document.getElementById("bjjUpdate")) return;
      var bar = document.createElement("div");
      bar.id = "bjjUpdate";
      bar.style.cssText = "position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;gap:14px;background:#15171b;border:1px solid #f0c419;border-radius:12px;padding:12px 16px;box-shadow:0 10px 34px rgba(0,0,0,.55);font-family:'Barlow',system-ui,sans-serif;color:#e9eaec";
      var txt = document.createElement("span");
      txt.textContent = "Nova versão disponível";
      txt.style.cssText = "font-size:14px;font-weight:700;white-space:nowrap";
      var reload = document.createElement("button");
      reload.textContent = "Recarregar";
      reload.style.cssText = "background:#2f9e44;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:800;cursor:pointer";
      reload.onclick = function () {
        pending = true;
        reload.textContent = "Atualizando…";
        try { worker.postMessage({ type: "SKIP_WAITING" }); } catch (e) { location.reload(); }
      };
      var close = document.createElement("button");
      close.textContent = "✕";
      close.setAttribute("aria-label", "Dispensar");
      close.style.cssText = "background:transparent;color:#9aa0a8;border:none;font-size:16px;font-weight:700;cursor:pointer;line-height:1";
      close.onclick = function () { bar.remove(); };
      bar.appendChild(txt); bar.appendChild(reload); bar.appendChild(close);
      document.body.appendChild(bar);
    }

    navigator.serviceWorker.register("sw.js").then(function (reg) {
      // Já havia uma versão nova aguardando de uma visita anterior?
      if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);
      reg.addEventListener("updatefound", function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", function () {
          // "installed" com um controller já ativo = é uma ATUALIZAÇÃO (não a 1ª instalação)
          if (nw.state === "installed" && navigator.serviceWorker.controller) showUpdate(nw);
        });
      });
    }).catch(function () {});

    // Recarrega apenas quando o usuário pediu (evita reload surpresa na 1ª instalação).
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      if (pending) { pending = false; location.reload(); }
    });
  });
})();
</script>
</body>
